syntax = "proto3";

package herdcore.v1;

// Herdcore speaks one WebSocket per participant (human or bot). The connection
// is the session: a client authenticates once with Join/Resume, then sends bare
// commands. Frames are protobuf-encoded (optionally deflated); there is no gRPC.

enum Action {
  ACTION_UNSPECIFIED = 0;
  ACTION_UP = 1;
  ACTION_DOWN = 2;
  ACTION_LEFT = 3;
  ACTION_RIGHT = 4;
  ACTION_STAY = 5;
}

enum PlayerKind {
  PLAYER_KIND_UNSPECIFIED = 0;
  PLAYER_KIND_HUMAN = 1;
  PLAYER_KIND_BOT = 2;
}

enum LobbyPhase {
  LOBBY_PHASE_UNSPECIFIED = 0;
  LOBBY_PHASE_WAITING = 1;
  LOBBY_PHASE_PLAYING = 2;
  LOBBY_PHASE_FINISHED = 3;
}

enum LobbyEventKind {
  LOBBY_EVENT_KIND_UNSPECIFIED = 0;
  LOBBY_EVENT_KIND_SNAPSHOT = 1;
  LOBBY_EVENT_KIND_LOBBY_UPDATED = 2;
  LOBBY_EVENT_KIND_GAME_STARTED = 3;
  LOBBY_EVENT_KIND_TURN_RESOLVED = 4;
  LOBBY_EVENT_KIND_HEARTBEAT = 5;
}

message Position {
  int32 x = 1;
  int32 y = 2;
}

message GamePlayerState {
  uint32 seat = 1;
  Position dog = 2;
  repeated Position pen = 3;
  uint32 score = 4;
  Action last_action = 5;
}

message GameState {
  uint32 layout_version = 1;
  int32 width = 2;
  int32 height = 3;
  uint64 turn = 4;
  reserved 5, 6;
  repeated GamePlayerState players = 7;
  repeated Position sheep = 8;
  repeated Position rocks = 9;
  bool game_over = 10;
  repeated uint32 winners = 11;
}

message LobbyPlayer {
  string player_id = 1;
  string display_name = 2;
  PlayerKind kind = 3;
  optional uint32 seat = 4;
  bool connected = 5;
  string bot_type_id = 6;
}

message LobbySnapshot {
  string lobby_id = 1;
  string lobby_code = 2;
  LobbyPhase phase = 3;
  string host_player_id = 4;
  uint32 max_players = 5;
  uint32 turn_seconds = 6;
  uint64 public_version = 7;
  uint64 game_id = 8;
  int64 deadline_unix_ms = 9;
  repeated LobbyPlayer players = 10;
  optional GameState game = 11;
}

// One past or in-progress game in a lobby's history.
message GameSummary {
  uint64 game_id = 1;
  LobbyPhase status = 2;       // PLAYING while live, FINISHED once decided
  repeated uint32 winners = 3; // winning seats, set when finished
  int64 ended_unix_ms = 4;
}

message RevealedMove {
  string player_id = 1;
  uint32 seat = 2;
  Action action = 3;
}

// The outcome of a finished game.
message GameResult {
  repeated uint32 winners = 1; // winning seats
  repeated uint32 scores = 2;  // final score per seat, indexed by seat
}

// Internal fan-out event a lobby broadcasts to its connected participants; the
// WebSocket layer wraps it into a ServerFrame.Update.
message LobbyEvent {
  uint64 version = 1;
  LobbyEventKind kind = 2;
  LobbySnapshot lobby = 3;
  repeated RevealedMove moves = 4;
  GameResult result = 5; // present on the event that ends a game
}

// ---------------------------------------------------------------------------
// WebSocket frames
// ---------------------------------------------------------------------------

// Client -> server.
message ClientFrame {
  oneof body {
    Join join = 1;
    Resume resume = 2;
    MoveCommand move = 3;
    StartCommand start = 4;
    AddBotCommand add_bot = 5;
    RemoveBotCommand remove_bot = 6;
    LeaveCommand leave = 7;
    PingCommand ping = 8;
    ListGamesCommand list_games = 9;
    RegisterProvider register_provider = 10;
  }
}

// A bot service registers as a provider, declaring which catalogue bot it
// serves; the server then pushes it Assign frames (one per CPU added) and the
// provider opens a gameplay connection per bot.
message RegisterProvider {
  string bot_type_id = 1;
}

// One entry in the server's bot catalogue, offered to players as a button.
message BotKind {
  string id = 1;      // bot_type_id used when adding this bot
  string name = 2;    // display name
  string address = 3; // where the bot lives (informational)
}

// Join or create a lobby by word, becoming a new participant.
message Join {
  string lobby_name = 1;
  string display_name = 2;
}

// Re-attach an existing session after a reconnect.
message Resume {
  string lobby_id = 1;
  string player_id = 2;
  string session_token = 3;
  uint64 after_version = 4;
}

message MoveCommand {
  uint64 game_id = 1;
  uint64 turn = 2;
  Action action = 3;
  string request_id = 4;
}

message StartCommand {}

message AddBotCommand {
  string display_name = 1;
  string bot_type_id = 2; // built-in strategy id, e.g. "greedy-v1"
  string url = 3;         // non-empty for a remote (pluggable) bot
}

message RemoveBotCommand {
  string bot_player_id = 1;
}

message LeaveCommand {}

message PingCommand {}

message ListGamesCommand {}

// Server -> client.
message ServerFrame {
  oneof body {
    Welcome welcome = 1;
    Update update = 2;
    GamesList games = 3;
    ServerError error = 4;
    Bye bye = 5;
    Pong pong = 6;
    Assign assign = 7;
  }
}

// Sent to a registered provider: play this seat by connecting back as a bot.
message Assign {
  string game_server_url = 1;
  string lobby_id = 2;
  string player_id = 3;
  string session_token = 4;
  string bot_type_id = 5;
}

// Sent right after a successful Join/Resume.
message Welcome {
  string player_id = 1;
  string session_token = 2;
  LobbySnapshot lobby = 3;
  bool my_move_submitted = 4;
  repeated BotKind catalogue = 5; // bots the player can add
}

// Any lobby/game state change.
message Update {
  LobbySnapshot lobby = 1;
  bool my_move_submitted = 2;
  LobbyEventKind kind = 3;
  repeated RevealedMove moves = 4;
  GameResult result = 5;
}

message GamesList {
  repeated GameSummary games = 1;
}

message ServerError {
  string message = 1;
  bool fatal = 2; // true => session is invalid; client should stop reconnecting
}

message Bye {}

message Pong {}
