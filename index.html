<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111318" />
    <title>Herdcore</title>
    <link
      data-trunk
      rel="rust"
      href="crates/web/Cargo.toml"
      data-cargo-manifest="crates/web/Cargo.toml"
    />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #111318;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }
      canvas {
        display: block;
        max-width: 100vw;
        max-height: 82vh;
        touch-action: manipulation;
      }
      #controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 920px;
        padding: 8px 8px 18px;
      }
      button {
        min-width: 76px;
        border: 1px solid #59616e;
        border-radius: 8px;
        font-size: 18px;
        padding: 12px 16px;
        margin: 4px;
        color: white;
        background: #272c34;
        cursor: pointer;
      }
      button:hover { background: #343b46; }
      button:active { transform: translateY(1px); }
      button:focus-visible { outline: 3px solid #79a9ff; outline-offset: 2px; }
      .panel {
        width: min(920px, calc(100vw - 24px));
        margin: 12px;
        padding: 16px;
        border: 1px solid #343a44;
        border-radius: 10px;
        background: #191d24;
      }
      .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      input {
        min-width: 130px;
        padding: 11px 12px;
        border: 1px solid #59616e;
        border-radius: 8px;
        font: inherit;
        color: white;
        background: #101319;
      }
      label { color: #bbc1cb; font-size: 14px; }
      #status { min-height: 24px; color: #ffd66b; }
      #players { white-space: pre-wrap; color: #dce1e9; line-height: 1.6; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <section id="connect-panel" class="panel">
      <h1>Herdcore</h1>
      <div class="row">
        <label>Server <input id="server-url" value="http://127.0.0.1:55051" /></label>
        <label>Name <input id="display-name" maxlength="24" value="Player" /></label>
        <label>Lobby code <input id="lobby-code-input" maxlength="6" /></label>
      </div>
      <div class="row">
        <label>Capacity <input id="max-players" type="number" min="2" max="16" value="4" /></label>
        <label>Turn seconds <input id="turn-seconds" type="number" min="3" max="300" value="20" /></label>
        <button id="create" type="button">Create lobby</button>
        <button id="join" type="button">Join lobby</button>
      </div>
    </section>
    <section id="lobby-panel" class="panel hidden">
      <div class="row">
        <strong>Lobby: <span id="lobby-code"></span></strong>
        <button id="add-bot" type="button">Add CPU</button>
        <button id="start" type="button">Start game</button>
        <button id="forget" type="button">Leave locally</button>
      </div>
      <div id="players"></div>
    </section>
    <div id="status"></div>
    <canvas id="game" class="hidden" aria-label="Herdcore game board"></canvas>
    <div id="controls" class="hidden" aria-label="Game controls">
      <button id="up" type="button">Up</button>
      <button id="down" type="button">Down</button>
      <button id="left" type="button">Left</button>
      <button id="right" type="button">Right</button>
      <button id="stay" type="button">Stay</button>
      <button id="reconnect" type="button">Reconnect</button>
    </div>
  </body>
</html>
