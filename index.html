<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#9bbc0f" />
    <title>Herdcore</title>
    <link
      data-trunk
      rel="rust"
      href="crates/web/Cargo.toml"
      data-cargo-manifest="crates/web/Cargo.toml"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --lcd: #9bbc0f;
        --lcd-dim: #8bac0f;
        --moss: #306230;
        --ink: #0f380f;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
      }
      body {
        font-family: "Press Start 2P", "Courier New", monospace;
        background: var(--lcd);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 14px 0 26px;
        line-height: 1.5;
        -webkit-font-smoothing: none;
      }
      /* Dot-matrix scanline overlay across the whole screen. */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        background-image: repeating-linear-gradient(
            0deg,
            rgba(15, 56, 15, 0.12) 0px,
            rgba(15, 56, 15, 0.12) 1px,
            transparent 1px,
            transparent 3px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(15, 56, 15, 0.08) 0px,
            rgba(15, 56, 15, 0.08) 1px,
            transparent 1px,
            transparent 3px
          );
      }
      h1 {
        font-size: 26px;
        letter-spacing: 2px;
        margin: 6px 0 2px;
        text-shadow: 2px 2px 0 var(--lcd-dim);
        cursor: pointer;
        user-select: none;
      }
      h1:hover {
        color: var(--moss);
      }
      /* The board is sized to a square in JS; full-bleed and borderless. */
      canvas {
        display: block;
        image-rendering: pixelated;
        touch-action: manipulation;
      }
      .panel {
        width: min(560px, calc(100vw - 24px));
        margin: 10px auto;
        padding: 18px;
        border: 4px solid var(--ink);
        background: var(--lcd);
        box-shadow: 6px 6px 0 0 var(--moss);
      }
      .field {
        margin: 14px 0;
      }
      label.cap {
        display: block;
        font-size: 9px;
        color: var(--moss);
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: stretch;
      }
      input {
        flex: 1 1 auto;
        min-width: 120px;
        padding: 12px;
        font-family: inherit;
        font-size: 12px;
        color: var(--ink);
        background: var(--lcd-dim);
        border: 3px solid var(--ink);
        outline: none;
      }
      input::placeholder {
        color: var(--moss);
      }
      button {
        font-family: inherit;
        font-size: 11px;
        color: var(--lcd);
        background: var(--ink);
        border: 3px solid var(--ink);
        padding: 12px 14px;
        cursor: pointer;
        letter-spacing: 1px;
      }
      button:hover {
        background: var(--moss);
      }
      button:active {
        transform: translate(1px, 1px);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button:focus-visible {
        outline: 3px solid var(--moss);
        outline-offset: 2px;
      }
      .dice {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
      }
      .die {
        display: block;
      }
      .primary {
        width: 100%;
        font-size: 15px;
        padding: 16px;
        margin: 6px 0 2px;
      }
      .lobby-head,
      .section-label {
        font-size: 9px;
        color: var(--moss);
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .section-label {
        margin-top: 16px;
      }
      .lobby-code {
        font-size: 16px;
        word-break: break-word;
        margin-bottom: 4px;
      }
      .players,
      .games {
        font-size: 10px;
        line-height: 1.9;
        padding: 12px;
        background: var(--lcd-dim);
        border: 3px solid var(--ink);
        min-height: 36px;
      }
      .game-row {
        color: var(--ink);
      }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .remove-bot {
        flex: 0 0 auto;
        font-size: 12px;
        line-height: 1;
        padding: 4px 9px;
      }
      .hint {
        font-size: 9px;
        color: var(--moss);
        margin-top: 12px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      /* Bot catalogue: selection of bots on one line. */
      .bot-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin-top: 14px;
      }
      .bot-btn {
        flex: 0 0 auto;
        background: var(--lcd-dim);
        color: var(--ink);
        font-size: 10px;
      }
      .bot-btn:hover {
        background: var(--moss);
        color: var(--lcd);
      }
      /* Start / Play Again on its own line at the bottom. */
      .start-row {
        margin-top: 12px;
      }
      .start-row button {
        width: 100%;
        font-size: 13px;
        padding: 14px;
      }
      #status {
        min-height: 22px;
        font-size: 10px;
        color: var(--ink);
        background: var(--lcd-dim);
        border: 3px solid var(--ink);
        padding: 10px 12px;
        margin: 10px auto;
        width: min(560px, calc(100vw - 20px));
        text-align: center;
        word-break: break-word;
      }
      #hud {
        font-size: 10px;
        color: var(--ink);
        letter-spacing: 1px;
        line-height: 1.8;
        text-align: center;
        margin: 8px auto 6px;
        width: min(560px, calc(100vw - 20px));
        word-break: break-word;
      }
      /* Gameboy D-pad: arrows on a cross with STAY in the middle. */
      #controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-areas:
          ". up ."
          "left stay right"
          ". down .";
        gap: 10px;
        width: min(232px, 62vw);
        margin: 16px auto 0;
      }
      #up { grid-area: up; }
      #down { grid-area: down; }
      #left { grid-area: left; }
      #right { grid-area: right; }
      #stay { grid-area: stay; }
      #controls button {
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        padding: 0;
        font-size: 10px;
      }
      #up::before,
      #down::before,
      #left::before,
      #right::before {
        content: "";
        width: 0;
        height: 0;
      }
      #up::before {
        border-left: 13px solid transparent;
        border-right: 13px solid transparent;
        border-bottom: 17px solid currentColor;
      }
      #down::before {
        border-left: 13px solid transparent;
        border-right: 13px solid transparent;
        border-top: 17px solid currentColor;
      }
      #left::before {
        border-top: 13px solid transparent;
        border-bottom: 13px solid transparent;
        border-right: 17px solid currentColor;
      }
      #right::before {
        border-top: 13px solid transparent;
        border-bottom: 13px solid transparent;
        border-left: 17px solid currentColor;
      }
    </style>
  </head>
  <body></body>
</html>
