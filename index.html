<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e0e18" />
    <title>Herdcore</title>
    <link
      data-trunk
      rel="rust"
      href="crates/web/Cargo.toml"
      data-cargo-manifest="crates/web/Cargo.toml"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0e18;
        --surface: #1a1a2c;
        --surface-dim: #131322;
        --border: #38385e;
        --text: #d8d8f0;
        --dim: #7878a0;
        --accent: #a0a0e8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
      }
      body {
        font-family: "Press Start 2P", "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 14px 0 26px;
        line-height: 1.5;
        -webkit-font-smoothing: none;
      }
      /* Scanline overlay. */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        background-image: repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.15) 0px,
            rgba(0, 0, 0, 0.15) 1px,
            transparent 1px,
            transparent 3px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.1) 0px,
            rgba(0, 0, 0, 0.1) 1px,
            transparent 1px,
            transparent 3px
          );
      }
      h1 {
        font-size: 26px;
        letter-spacing: 2px;
        margin: 6px 0 2px;
        text-shadow: 2px 2px 0 var(--surface);
        cursor: pointer;
        user-select: none;
      }
      h1:hover {
        color: var(--dim);
      }
      /* The board is sized to a square in JS; full-bleed and borderless. */
      canvas {
        display: block;
        image-rendering: pixelated;
        touch-action: manipulation;
      }
      .panel {
        width: min(560px, calc(100vw - 24px));
        margin: 10px auto;
        padding: 18px;
        border: 4px solid var(--border);
        background: var(--surface);
        box-shadow: 6px 6px 0 0 var(--border);
      }
      .field {
        margin: 14px 0;
      }
      label.cap {
        display: block;
        font-size: 9px;
        color: var(--dim);
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: stretch;
      }
      input {
        flex: 1 1 auto;
        min-width: 120px;
        padding: 12px;
        font-family: inherit;
        font-size: 12px;
        color: var(--text);
        background: var(--surface-dim);
        border: 3px solid var(--border);
        outline: none;
      }
      input::placeholder {
        color: var(--dim);
      }
      button {
        font-family: inherit;
        font-size: 11px;
        color: var(--text);
        background: var(--surface);
        border: 3px solid var(--border);
        padding: 12px 14px;
        cursor: pointer;
        letter-spacing: 1px;
        /* Kill iOS double-tap-to-zoom and the tap highlight on rapid presses. */
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      button:hover {
        background: var(--accent);
        color: var(--bg);
      }
      button:active {
        transform: translate(1px, 1px);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      .dice {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
      }
      .die {
        display: block;
      }
      .primary {
        width: 100%;
        font-size: 15px;
        padding: 16px;
        margin: 6px 0 2px;
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }
      .primary:hover {
        background: var(--text);
        border-color: var(--text);
      }
      .lobby-head,
      .section-label {
        font-size: 9px;
        color: var(--dim);
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .section-label {
        margin-top: 16px;
      }
      .lobby-code {
        font-size: 16px;
        word-break: break-word;
        margin-bottom: 4px;
      }
      .players,
      .games {
        font-size: 10px;
        line-height: 1.9;
        padding: 12px;
        background: var(--surface-dim);
        border: 3px solid var(--border);
        min-height: 36px;
      }
      .game-row {
        color: var(--text);
      }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .remove-bot {
        flex: 0 0 auto;
        font-size: 12px;
        line-height: 1;
        padding: 4px 9px;
      }
      .hint {
        font-size: 9px;
        color: var(--dim);
        margin-top: 12px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      /* Bot catalogue: selection of bots on one line. */
      .bot-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin-top: 14px;
      }
      .bot-btn {
        flex: 0 0 auto;
        background: var(--surface-dim);
        color: var(--text);
        font-size: 10px;
      }
      .bot-btn:hover {
        background: var(--accent);
        color: var(--bg);
      }
      /* Start / Play Again on its own line at the bottom. */
      .start-row {
        margin-top: 12px;
      }
      .start-row button {
        width: 100%;
        font-size: 13px;
        padding: 14px;
      }
      /* Transient status, pinned to the bottom of the page. */
      #status {
        font-size: 9px;
        color: var(--dim);
        margin: 14px auto 0;
        width: min(560px, calc(100vw - 20px));
        text-align: center;
        word-break: break-word;
      }
      #hud {
        width: min(560px, calc(100vw - 20px));
        margin: 8px auto 6px;
      }
      .hud-line {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 14px;
        font-size: 11px;
        color: var(--text);
        letter-spacing: 1px;
      }
      /* Full-bleed turn timer: a bar the browser drains over the turn length.
         Keyed per turn in the markup so it restarts each turn. */
      #timebar {
        width: 100vw;
        height: 10px;
        background: var(--surface-dim);
        border-bottom: 2px solid var(--border);
        overflow: hidden;
        margin-bottom: 4px;
      }
      #timebar .fill {
        height: 100%;
        width: 100%;
        background: var(--accent);
        transform-origin: left center;
        animation-name: drain;
        animation-timing-function: linear;
        animation-fill-mode: forwards;
      }
      @keyframes drain {
        from {
          transform: scaleX(1);
        }
        to {
          transform: scaleX(0);
        }
      }
      .sheep {
        color: var(--dim);
      }
      .scoreboard {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin-top: 8px;
      }
      .chip {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 9px;
        padding: 5px 8px;
        background: var(--surface-dim);
        border: 2px solid var(--border);
      }
      .chip .dot {
        width: 9px;
        height: 9px;
        border: 2px solid currentColor;
        background: transparent;
      }
      .chip .pscore {
        font-weight: bold;
      }
      /* Move status banner: the single clearest signal of whether you can act. */
      #movebar {
        width: min(232px, 62vw);
        margin: 14px auto 0;
        padding: 10px 8px;
        text-align: center;
        font-size: 11px;
        letter-spacing: 1px;
        border: 3px solid var(--border);
        color: var(--dim);
        background: var(--surface-dim);
      }
      #movebar.active {
        color: var(--bg);
        background: #55ee77;
        border-color: #55ee77;
        animation: pulse 1s ease-in-out infinite;
      }
      #movebar.moved {
        color: var(--bg);
        background: var(--accent);
        border-color: var(--accent);
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(85, 238, 119, 0.6);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(85, 238, 119, 0);
        }
      }
      /* Gameboy D-pad: arrows on a cross with STAY in the middle. */
      #controls {
        touch-action: manipulation;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-areas:
          ". up ."
          "left stay right"
          ". down .";
        gap: 10px;
        width: min(232px, 62vw);
        margin: 12px auto 0;
        padding: 8px;
        border: 3px solid transparent;
      }
      /* Only the active state lights the pad up; every other state reads as off. */
      #controls.active {
        border-color: #55ee77;
      }
      #controls.active button {
        color: #55ee77;
        border-color: #55ee77;
      }
      #up { grid-area: up; }
      #down { grid-area: down; }
      #left { grid-area: left; }
      #right { grid-area: right; }
      #stay { grid-area: stay; }
      #controls button {
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        padding: 0;
        font-size: 10px;
      }
      #up::before,
      #down::before,
      #left::before,
      #right::before {
        content: "";
        width: 0;
        height: 0;
      }
      #up::before {
        border-left: 13px solid transparent;
        border-right: 13px solid transparent;
        border-bottom: 17px solid currentColor;
      }
      #down::before {
        border-left: 13px solid transparent;
        border-right: 13px solid transparent;
        border-top: 17px solid currentColor;
      }
      #left::before {
        border-top: 13px solid transparent;
        border-bottom: 13px solid transparent;
        border-right: 17px solid currentColor;
      }
      #right::before {
        border-top: 13px solid transparent;
        border-bottom: 13px solid transparent;
        border-left: 17px solid currentColor;
      }
    </style>
  </head>
  <body></body>
</html>
